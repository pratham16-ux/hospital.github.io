  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

</head>
<body>


  <!-- Scroll progress -->
  <div class="scroll-progress" aria-hidden="true"></div>

  
  <main id="main">
    <section class="errpage">
      <div class="blob blob--1" aria-hidden="true"></div>
      <div class="blob blob--2" aria-hidden="true"></div>
      <div>
        <p class="code">404</p>
        <svg class="flatline" viewBox="0 0 460 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M0 30 H150 L165 30 175 8 190 52 200 30 H300 L312 30 320 16 332 44 340 30 H460"/>
        </svg>
        <h1>This page has flatlined.</h1>
        <p>The link you followed doesn't exist or has been moved. Don't worry — everything else here is in perfect health.</p>
        <div class="actions">
          <a class="btn btn--primary" href="index.html">Back to homepage</a>
          <a class="btn btn--ghost" href="contact.html">Contact us</a>
        </div>
      </div>
    </section>
</main>


  <!-- ======================= Appointment modal ======================= -->
  <div class="modal" id="appointmentModal" role="dialog" aria-modal="true" aria-labelledby="apptTitle" aria-hidden="true">
    <div class="modal-card">
      <header>
        <div>
          <h3 id="apptTitle">Book an appointment</h3>
          <p>Our front desk will confirm your slot on call within 30 minutes.</p>
        </div>
        <button class="modal-close" type="button" data-close-modal aria-label="Close appointment form">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>

      <form class="form-grid" data-validate-form data-success-message="Appointment request sent! We'll call you shortly." novalidate>
        <div class="field">
          <label for="apName">Full name</label>
          <input type="text" id="apName" placeholder="e.g. Ramesh Kumar" data-validate="name" autocomplete="name" maxlength="16">
          <span class="field-error" role="alert"></span>
        </div>
        <div class="field">
          <label for="apPhone">Mobile number</label>
          <input type="tel" id="apPhone" placeholder="98765 43210" data-validate="phone" autocomplete="tel" inputmode="numeric" maxlength="10">
          <span class="field-error" role="alert"></span>
        </div>
        <div class="field">
          <label for="apDept">Department</label>
          <select id="apDept" data-validate="required">
            <option value="">Choose department</option>
            <option>Cardiology</option><option>Neurology</option><option>Orthopedics</option>
            <option>Pediatrics</option><option>ENT</option><option>Dermatology</option>
            <option>Oncology</option><option>Dental</option><option>Radiology</option>
            <option>General Medicine</option><option>Gynecology</option>
          </select>
          <span class="field-error" role="alert"></span>
        </div>
        <div class="field">
          <label for="apDate">Preferred date</label>
          <input type="date" id="apDate" data-validate="date">
          <span class="field-error" role="alert"></span>
        </div>
        <div class="field field--full">
          <label for="apNote">Anything the doctor should know? <small style="color:var(--muted); font-weight:400;">(optional)</small></label>
          <textarea id="apNote" placeholder="Symptoms, ongoing medication, previous reports…"></textarea>
          <span class="field-error" role="alert"></span>
        </div>
        <div class="field field--full">
          <button class="btn btn--primary" type="submit" style="width:100%;">Confirm booking request</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/script.js" defer></script>
  <script src="js/animations.js" defer></script>
</body>
</html>
